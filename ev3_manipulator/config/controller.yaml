controller_manager:
  ros__parameters:
    update_rate: 1000          # matches your fast_physics.sdf 0.001s step

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: position_controllers/JointGroupPositionController

    conveyor_controller:
      type: velocity_controllers/JointGroupVelocityController

arm_controller:
  ros__parameters:
    joints:
      - arm_1_base_link_joint
      # - arm_2_left_arm_linkage_joint  
      - arm_2_left_arm_linkage_joint      # fixed — was: left_arm_linkage_arm_2_joint
    command_interfaces: [position]
    state_interfaces: [position, velocity]
    allow_nonzero_velocity_at_trajectory_end: false
    open_loop_control: true
    allow_integration_in_goal_trajectories: true
    action_monitor_rate: 20.0

gripper_controller:
  ros__parameters:
    joints:
      - left_gear_arm_3_joint
    command_interfaces: [position]
    state_interfaces: [position]

conveyor_controller:
  ros__parameters:
    joints:
      - left_pulley_shaft_motor_housing_shaft   # fixed — was: ..._joint
    command_interfaces: [velocity]
    state_interfaces: [position, velocity]
