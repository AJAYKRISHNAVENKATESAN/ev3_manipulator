# ev3_manipulator dev container — ROS 2 Jazzy + Gazebo Harmonic (secondary env;
# the default is docker/, ROS 2 Humble + Gazebo Fortress).
# Native Ubuntu host with an NVIDIA GPU. GUI (RViz/Gazebo) via the host X server;
# GPU via nvidia-container-toolkit.
# On the host once per session, allow the container to use your display:
#   xhost +local:docker
services:
  ev3-manipulator-jazzy:
    build:
      context: ../..
      dockerfile: docker/jazzy/Dockerfile
    container_name: ev3-manipulator-jazzy
    hostname: ev3-manipulator-jazzy

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # drive GLX on the NVIDIA GPU (Xorg runs on the RTX here)
      - __NV_PRIME_RENDER_OFFLOAD=1
      - __GLX_VENDOR_LIBRARY_NAME=nvidia

    volumes:
      # this repo, mounted as a package in the colcon workspace
      - ../..:/workspace/src/ev3_manipulator
      # native X11 socket for GUI apps
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # persistent build artifacts (separate from the Humble env's volumes)
      - ev3_manipulator_jazzy_build:/workspace/build
      - ev3_manipulator_jazzy_install:/workspace/install
      - ev3_manipulator_jazzy_log:/workspace/log

    # DRM render nodes for hardware-accelerated GUI (RViz/Gazebo)
    devices:
      - /dev/dri:/dev/dri

    network_mode: host
    stdin_open: true
    tty: true

    # NVIDIA GPU (requires nvidia-container-toolkit on the host)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, graphics, display, compute, utility]

volumes:
  ev3_manipulator_jazzy_build:
  ev3_manipulator_jazzy_install:
  ev3_manipulator_jazzy_log:
