# ev3_manipulator dev container — native Ubuntu host with an NVIDIA GPU.
# GUI (RViz/Gazebo) via the host X server; GPU via nvidia-container-toolkit.
# On the host once per session, allow the container to use your display:
#   xhost +local:docker
services:
  ev3-manipulator-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ev3-manipulator-dev
    hostname: ev3-manipulator-dev

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

    volumes:
      # this repo, mounted as a package in the colcon workspace
      - ..:/workspace/src/ev3_manipulator
      # native X11 socket for GUI apps
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # persistent build artifacts
      - ev3_manipulator_build:/workspace/build
      - ev3_manipulator_install:/workspace/install
      - ev3_manipulator_log:/workspace/log

    network_mode: host
    stdin_open: true
    tty: true

    # NVIDIA GPU (requires nvidia-container-toolkit on the host)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, graphics, display, compute, utility]

  # ROS 2 Humble + Gazebo Fortress (Ignition) — the stack the conveyor belt
  # plugin builds against. Use this for the conveyor work:
  #   docker compose up -d ev3-manipulator-fortress
  ev3-manipulator-fortress:
    build:
      context: ..
      dockerfile: docker/Dockerfile.humble
    container_name: ev3-manipulator-fortress
    hostname: ev3-manipulator-fortress

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

    volumes:
      - ..:/workspace/src/ev3_manipulator
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ev3_fortress_build:/workspace/build
      - ev3_fortress_install:/workspace/install
      - ev3_fortress_log:/workspace/log

    network_mode: host
    stdin_open: true
    tty: true

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, graphics, display, compute, utility]

volumes:
  ev3_manipulator_build:
  ev3_manipulator_install:
  ev3_manipulator_log:
  ev3_fortress_build:
  ev3_fortress_install:
  ev3_fortress_log:
